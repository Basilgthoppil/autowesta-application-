<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWesta - Login</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        .login-container {
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
            }
            50% {
                box-shadow: 0 10px 40px rgba(6, 182, 212, 0.6);
            }
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .logo-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #06b6d4;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #06b6d4;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ec4899 0%, #ef4444 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(236, 72, 153, 0.6);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #06b6d4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #3b82f6;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86efac;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .register-link a {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            color: #3b82f6;
        }

        @media (max-width: 500px) {
            .login-container {
                padding: 40px 30px;
            }

            .logo-text {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated particles background -->
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">⚡</div>
            <div class="logo-text">AUTOWESTA</div>
            <div class="logo-subtitle">Telemetry Intelligence</div>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔐</span>
                    <input 
                        type="text" 
                        id="accessId" 
                        placeholder="Access ID" 
                        required
                        autocomplete="username"
                    >
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input 
                        type="password" 
                        id="systemKey" 
                        placeholder="System Key" 
                        required
                        autocomplete="current-password"
                    >
                    <span class="password-toggle" id="togglePassword">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Authorize Access
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </form>

        <div class="forgot-password">
            <a href="#" id="forgotPassword">Forgot your credentials?</a>
        </div>

        <div class="register-link">
            Don't have access? <a href="#" id="requestAccess">Request Access</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDxEzOn8z7-8HrS94hfHS1sz2aPQem0v38",
            authDomain: "autowesta-f5007.firebaseapp.com",
            databaseURL: "https://autowesta-f5007-default-rtdb.firebaseio.com",
            projectId: "autowesta-f5007",
            storageBucket: "autowesta-f5007.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================
        // DEMO CREDENTIALS (For Testing)
        // ============================================
        // You can replace this with actual authentication
        const DEMO_USERS = {
            'admin': 'autowesta2024',
            'user1': 'weather123',
            'demo': 'demo123'
        };

        // ============================================
        // CREATE BACKGROUND PARTICLES
        // ============================================
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        // ============================================
        // PASSWORD TOGGLE
        // ============================================
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('systemKey');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // ============================================
        // SHOW/HIDE MESSAGES
        // ============================================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // ============================================
        // LOGIN FORM SUBMISSION
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessages();

            const accessId = document.getElementById('accessId').value.trim();
            const systemKey = document.getElementById('systemKey').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            // Show loading
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.6';
            loading.style.display = 'block';

            // Simulate authentication delay
            setTimeout(() => {
                // Check credentials
                if (DEMO_USERS[accessId] && DEMO_USERS[accessId] === systemKey) {
                    // Success!
                    showSuccess('✓ Access authorized! Redirecting...');
                    
                    // Store session
                    localStorage.setItem('autowestaAuth', 'true');
                    localStorage.setItem('autowestaUser', accessId);
                    localStorage.setItem('autowestaLoginTime', new Date().toISOString());

                    // Redirect to dashboard after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // Failed
                    showError('⚠️ Invalid Access ID or System Key');
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                    loading.style.display = 'none';
                }
            }, 1500);
        });

        // ============================================
        // FORGOT PASSWORD LINK
        // ============================================
        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Please contact your system administrator to reset your credentials.\n\nEmail: admin@autowesta.com\nPhone: +91-XXX-XXX-XXXX');
        });

        // ============================================
        // REQUEST ACCESS LINK
        // ============================================
        document.getElementById('requestAccess').addEventListener('click', function(e) {
            e.preventDefault();
            alert('To request access to the AutoWesta Weather Station:\n\n1. Contact: admin@autowesta.com\n2. Provide your organization details\n3. Wait for approval (24-48 hours)\n\nDemo credentials:\nAccess ID: demo\nSystem Key: demo123');
        });

        // ============================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================
        window.addEventListener('load', function() {
            const isAuthenticated = localStorage.getItem('autowestaAuth');
            if (isAuthenticated === 'true') {
                // Already logged in, redirect to dashboard
                window.location.href = 'index.html';
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        document.getElementById('accessId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('systemKey').focus();
            }
        });

        // ============================================
        // PWA SERVICE WORKER REGISTRATION
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
